<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="BookLedgerPro">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0b5a54"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Ledger-Linien (Buchhaltung) -->
  <g stroke="#a7f3d0" stroke-width="14" stroke-linecap="round" opacity="0.85">
    <line x1="150" y1="170" x2="362" y2="170"/>
    <line x1="150" y1="226" x2="362" y2="226"/>
    <line x1="150" y1="282" x2="300" y2="282"/>
  </g>
  <!-- Dezentes Mycel: Knoten + Fäden -->
  <g stroke="#ccfbf1" stroke-width="9" stroke-linecap="round" opacity="0.7">
    <line x1="256" y1="356" x2="180" y2="300"/>
    <line x1="256" y1="356" x2="332" y2="300"/>
    <line x1="256" y1="356" x2="210" y2="412"/>
    <line x1="256" y1="356" x2="306" y2="408"/>
  </g>
  <g fill="#ecfeff">
    <circle cx="180" cy="300" r="11"/>
    <circle cx="332" cy="300" r="11"/>
    <circle cx="210" cy="412" r="11"/>
    <circle cx="306" cy="408" r="11"/>
  </g>
  <circle cx="256" cy="356" r="26" fill="#5eead4"/>
</svg>
