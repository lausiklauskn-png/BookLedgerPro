name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Logik-Smoke-Test (Krypto + Shamir)
        run: node tests/run.mjs
