  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="BookLedgerPro — offline-first, verschlüsselte Buchhaltung mit KI-Unterstützung." />
  <title>BookLedgerPro</title>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="BookLedgerPro" />
  <meta property="og:description" content="Offline-first, verschlüsselte Buchhaltung · KI-gestützt · GoBD/DSGVO." />
  <meta property="og:image" content="https://lausiklauskn-png.github.io/BookLedgerPro/assets/img/og-image.png" />
  <meta property="og:url" content="https://lausiklauskn-png.github.io/BookLedgerPro/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BookLedgerPro" />
  <meta name="twitter:description" content="Offline-first, verschlüsselte Buchhaltung · KI-gestützt · GoBD/DSGVO." />
  <meta name="twitter:image" content="https://lausiklauskn-png.github.io/BookLedgerPro/assets/img/og-image.png" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./assets/tokens.css" />
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body>
  <noscript>BookLedgerPro benötigt JavaScript (läuft vollständig lokal in Ihrem Browser).</noscript>

  <div id="app-root">
    <div class="lock-screen">
      <div class="lock-card"><p class="muted">Lädt …</p></div>
    </div>
  </div>

  <!-- Build-frei: native ES-Module, keine CDNs (offline-first). -->
  <script type="module" src="./src/main.js"></script>

  <!-- SBKIM Andock-Runtime + Auto-Lauschen (Stufe 2, 2026-06-27) — additiv.
       Acht Module byte-identisch aus Sage src/modules/ kopiert (Modul-09-Regel:
       kopieren, nicht modifizieren). 05b als type=module (importiert noble relativ).
       sbkim-init.js startet nach Anastomose.init() fail-soft listenNostr() —
       Empfangsmodus mit Antwortrecht. Betrifft NUR die SBKIM-Identität, nie
       Buchhaltungsdaten. -->
  <script src="./sbkim/01_storage.js"></script>
  <script src="./sbkim/02_spore.js"></script>
  <script src="./sbkim/03_embedding.js"></script>
  <script src="./sbkim/04_match.js"></script>
  <script src="./sbkim/05_anastomose.js"></script>
  <script src="./sbkim/07_apoptose.js"></script>
  <!-- Modul 15 Membran (Außenhülle / Fremdzugriff-Lampe) + Modul 16 SBKIM-Siegel
       (Selbst-Bezeugung). Byte-identisch aus Sage src/modules/ kopiert. BLP
       erwirbt damit ein echtes, zertifiziertes Siegel im Widget (Anti-Green-
       washing: das Siegel rendert nur, wenn die Pflicht-Module wirklich da sind).
       Betrifft NUR die SBKIM-Identität, nie Buchhaltungsdaten. -->
  <script src="./sbkim/15_membran.js"></script>
  <script src="./sbkim/16_siegel.js"></script>
  <!-- Modul 17 Floating-Widget (Lampen-Design): LEBT/VERKEHR/FREMD/SIEGEL. -->
  <script src="./sbkim/17_floating_widget.js"></script>
  <script type="module" src="./sbkim/05b_nostr_relay.js"></script>
  <script src="./sbkim/sbkim-init.js"></script>
</body>
</html>
